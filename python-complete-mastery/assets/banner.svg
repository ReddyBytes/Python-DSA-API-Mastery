<svg viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#0a1a0a"/>
      <stop offset="50%"  style="stop-color:#0f200f"/>
      <stop offset="100%" style="stop-color:#070f07"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#84CC16"/>
      <stop offset="50%"  style="stop-color:#EAB308"/>
      <stop offset="100%" style="stop-color:#84CC16"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#84CC16;stop-opacity:0"/>
      <stop offset="50%"  style="stop-color:#EAB308"/>
      <stop offset="100%" style="stop-color:#84CC16;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#152015"/>
      <stop offset="100%" style="stop-color:#0a1a0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="240" fill="url(#bg)"/>

  <g opacity="0.05" stroke="#84CC16" stroke-width="0.5">
    <line x1="0" y1="60"  x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="150" y1="0" x2="150" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="240"/>
    <line x1="450" y1="0" x2="450" y2="240"/>
    <line x1="600" y1="0" x2="600" y2="240"/>
    <line x1="750" y1="0" x2="750" y2="240"/>
  </g>

  <rect x="40"  y="168" width="100" height="36" rx="6" fill="url(#nodeGrad)" stroke="#84CC16" stroke-width="1.5"/>
  <text x="90"  y="191" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#84CC16" letter-spacing="1">⚙️ Core</text>

  <line x1="140" y1="186" x2="170" y2="186" stroke="#84CC16" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="170,182 178,186 170,190" fill="#84CC16" opacity="0.8"/>

  <rect x="178" y="168" width="110" height="36" rx="6" fill="url(#nodeGrad)" stroke="#EAB308" stroke-width="1.5"/>
  <text x="233" y="191" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#EAB308" letter-spacing="1">🔧 Advanced</text>

  <line x1="288" y1="186" x2="318" y2="186" stroke="#EAB308" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </line>
  <polygon points="318,182 326,186 318,190" fill="#EAB308" opacity="0.8"/>

  <rect x="326" y="168" width="120" height="36" rx="6" fill="url(#nodeGrad)" stroke="#84CC16" stroke-width="1.5"/>
  <text x="386" y="191" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#84CC16" letter-spacing="1">🏭 Production</text>

  <line x1="446" y1="186" x2="476" y2="186" stroke="#84CC16" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
  </line>
  <polygon points="476,182 484,186 476,190" fill="#84CC16" opacity="0.8"/>

  <rect x="484" y="168" width="130" height="36" rx="6" fill="url(#nodeGrad)" stroke="#EAB308" stroke-width="1.5"/>
  <text x="549" y="191" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#EAB308" letter-spacing="1">🎯 Interview</text>

  <rect x="200" y="42" width="500" height="1.5" fill="url(#arrowGrad)" rx="1">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>

  <text x="450" y="96" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="14" font-weight="bold"
        fill="#4a5568" letter-spacing="10">COMPLETE MASTERY</text>

  <text x="450" y="155" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="64" font-weight="bold"
        fill="url(#titleGrad)" filter="url(#glow)" letter-spacing="8">PYTHON</text>

  <rect x="200" y="160" width="500" height="1.5" fill="url(#arrowGrad)" rx="1">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </rect>

  <text x="450" y="222" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" fill="#4a5568" letter-spacing="4">FUNDAMENTALS TO PRODUCTION  ·  ZERO TO EXPERT</text>
</svg>
