<svg viewBox="0 0 900 28" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#84CC16;stop-opacity:0"/>
      <stop offset="25%"  style="stop-color:#84CC16;stop-opacity:0.9"/>
      <stop offset="50%"  style="stop-color:#EAB308"/>
      <stop offset="75%"  style="stop-color:#84CC16;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#84CC16;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#0a1a0a"/>
      <stop offset="50%"  style="stop-color:#0f200f"/>
      <stop offset="100%" style="stop-color:#0a1a0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="28" fill="url(#bgGrad)"/>
  <line x1="0" y1="14" x2="900" y2="14" stroke="url(#lineGrad)" stroke-width="1.5"/>
  <circle cx="130" cy="14" r="2"   fill="#84CC16" opacity="0.6"/>
  <circle cx="260" cy="14" r="1.5" fill="#EAB308" opacity="0.5"/>
  <circle cx="640" cy="14" r="1.5" fill="#EAB308" opacity="0.5"/>
  <circle cx="770" cy="14" r="2"   fill="#84CC16" opacity="0.6"/>
  <circle cx="320" cy="14" r="3.5" fill="#84CC16" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <polygon points="450,7 458,14 450,21 442,14" fill="#EAB308" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.8s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="580" cy="14" r="3.5" fill="#84CC16" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/>
  </circle>
</svg>
