<svg viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#0d0d2a"/>
      <stop offset="50%"  style="stop-color:#151535"/>
      <stop offset="100%" style="stop-color:#0a0a20"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#A855F7"/>
      <stop offset="50%"  style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#A855F7;stop-opacity:0"/>
      <stop offset="50%"  style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0d0d2a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="240" fill="url(#bg)"/>

  <g opacity="0.05" stroke="#A855F7" stroke-width="0.5">
    <line x1="0" y1="60"  x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="150" y1="0" x2="150" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="240"/>
    <line x1="450" y1="0" x2="450" y2="240"/>
    <line x1="600" y1="0" x2="600" y2="240"/>
    <line x1="750" y1="0" x2="750" y2="240"/>
  </g>

  <!-- HTTP pipeline nodes -->
  <rect x="30"  y="168" width="80" height="36" rx="6" fill="url(#nodeGrad)" stroke="#A855F7" stroke-width="1.5"/>
  <text x="70"  y="191" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#A855F7" letter-spacing="1">GET /api</text>

  <line x1="110" y1="186" x2="140" y2="186" stroke="#A855F7" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="140,182 148,186 140,190" fill="#A855F7" opacity="0.8"/>

  <rect x="148" y="168" width="90" height="36" rx="6" fill="url(#nodeGrad)" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="193" y="191" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#7C3AED" letter-spacing="1">🔐 Auth</text>

  <line x1="238" y1="186" x2="268" y2="186" stroke="#7C3AED" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </line>
  <polygon points="268,182 276,186 268,190" fill="#7C3AED" opacity="0.8"/>

  <rect x="276" y="168" width="100" height="36" rx="6" fill="url(#nodeGrad)" stroke="#A855F7" stroke-width="1.5"/>
  <text x="326" y="191" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#A855F7" letter-spacing="1">⚡ FastAPI</text>

  <line x1="376" y1="186" x2="406" y2="186" stroke="#A855F7" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
  </line>
  <polygon points="406,182 414,186 406,190" fill="#A855F7" opacity="0.8"/>

  <rect x="414" y="168" width="100" height="36" rx="6" fill="url(#nodeGrad)" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="464" y="191" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#7C3AED" letter-spacing="1">🔌 GraphQL</text>

  <line x1="514" y1="186" x2="544" y2="186" stroke="#7C3AED" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
  </line>
  <polygon points="544,182 552,186 544,190" fill="#7C3AED" opacity="0.8"/>

  <rect x="552" y="168" width="80" height="36" rx="6" fill="url(#nodeGrad)" stroke="#A855F7" stroke-width="1.5"/>
  <text x="592" y="191" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#A855F7" letter-spacing="1">🚀 gRPC</text>

  <line x1="632" y1="186" x2="662" y2="186" stroke="#A855F7" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
  </line>
  <polygon points="662,182 670,186 662,190" fill="#A855F7" opacity="0.8"/>

  <rect x="670" y="168" width="100" height="36" rx="6" fill="url(#nodeGrad)" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="720" y="191" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#7C3AED" letter-spacing="1">200 OK</text>

  <rect x="200" y="42" width="500" height="1.5" fill="url(#arrowGrad)" rx="1">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>

  <text x="450" y="96" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="14" font-weight="bold"
        fill="#4a5568" letter-spacing="10">COMPLETE MASTERY</text>

  <text x="450" y="155" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="54" font-weight="bold"
        fill="url(#titleGrad)" filter="url(#glow)" letter-spacing="8">API MASTERY</text>

  <rect x="200" y="160" width="500" height="1.5" fill="url(#arrowGrad)" rx="1">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </rect>

  <text x="450" y="222" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" fill="#4a5568" letter-spacing="4">REST · FASTAPI · GRAPHQL · GRPC · PRODUCTION</text>
</svg>
